services:
  pgserver:
    image: 'postgres:18.1'
    container_name: 'pgserver'
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: "secret123"
      POSTGRES_USER: "bn"
      POSTGRES_DB: "bnauth"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - bn-auth-network

  redis:
    image: 'redis:8.2.4'
    container_name: 'redis'
    ports:
      - 6379:6379
    networks:
      - bn-auth-network

  app:
    build: .
    depends_on:
      - pgserver
      - redis
    ports:
      - "8080:8080"
    networks:
      - bn-auth-network


networks:
  bn-auth-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
